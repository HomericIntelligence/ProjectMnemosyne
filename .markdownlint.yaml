# Markdownlint configuration
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md
#
# ProjectMnemosyne is a skills knowledge-base repository. Skill files and
# prompt templates use their own document conventions that differ from standard
# markdown style guides. Rules that generate false positives on well-formed
# skill/prompt documents are disabled here.

default: true

# Line length: disable — skill descriptions, table cells, and prompt text
# routinely exceed 120 chars in ways that are intentional and unambiguous.
MD013: false

# Blanks around headings: disabled — skill files use compact heading/content
# blocks that are standard for knowledge-base documentation.
MD022: false

# Blanks around fenced code blocks: disabled — skill files embed code examples
# in dense reference sections without surrounding blank lines.
MD031: false

# Blanks around lists: disabled — skill files use compact list sections without
# mandatory surrounding blank lines.
MD032: false

# No bare URLs: disabled — skill docs frequently cite URLs inline as references.
MD034: false

# Ordered list prefix style: disabled — skill docs use 1./1. incremental or
# 1./2./3. styles interchangeably.
MD029: false

# Strong/bold style: disabled — skill files mix ** and __ bold styles.
MD050: false

# Blanks around tables: disabled — skill files use tables in compact blocks.
MD058: false

# Single trailing newline: disabled — skill files generated by various tools
# may or may not include a trailing newline.
MD047: false

# Inline HTML: allow XML-like tags used in Claude prompt templates and skill
# command files, plus placeholder tokens like <number>, <branch>, <id> that
# appear in code examples and are falsely detected as HTML elements.
MD033:
  allowed_elements:
    - T
    - img
    - br
    - details
    - summary
    - system
    - task
    - step
    - section
    - principle
    - tool
    - result
    - command
    - output
    - context
    - instructions
    - branch
    - category
    - changes
    - date
    - file
    - id
    - keyword
    - name
    - number
    - other
    - owner
    - pid
    - prefix
    - project
    - recipe
    - repo
    - script
    - skill-name
    - files
    - subject
    - url

# Duplicate headings: allow same heading text at different nesting levels.
# CHANGELOG files legitimately repeat "Added"/"Fixed" under each version.
# Skill notes files repeat section names across multiple PR entries.
MD024:
  siblings_only: true

# Multiple top-level headings: disabled — skill .notes.md files use H1 for
# each PR/issue entry as a natural document structure (not a title hierarchy).
MD025: false

MD036: false
MD040: false
MD041: false

MD046:
  style: fenced

# Table column style: consistent within each table. markdownlint detects the
# style of the first data row and requires the rest of the table to match.
MD060:
  style: consistent
