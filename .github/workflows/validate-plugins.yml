name: Validate Plugins

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Validate flat-format skill files
        run: python3 scripts/validate_plugins.py

      - name: Run test suite
        run: pytest tests/ -v

      - name: Check skill template validity
        run: |
          echo "Checking template structure..."
          if [ ! -f "templates/skill-template.md" ]; then
            echo "ERROR: Template skill-template.md missing"
            exit 1
          fi
          echo "Template structure valid"
