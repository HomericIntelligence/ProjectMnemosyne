name: Update Marketplace

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'plugins/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Generate marketplace.json
        run: python3 scripts/generate_marketplace.py .claude-plugin/marketplace.json

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet .claude-plugin/marketplace.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and open PR
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-marketplace-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: update marketplace.json [skip ci]"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update marketplace.json" \
            --body "Auto-generated: regenerate marketplace.json after skills change." \
            --base main \
            --head "$BRANCH"
          gh pr merge --auto --rebase
