name: Update Marketplace

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'plugins/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate marketplace.json
        run: python3 scripts/generate_marketplace.py .claude-plugin/marketplace.json

      - name: Validate skills
        run: python3 scripts/validate_plugins.py

      - name: Run tests
        run: python3 -m pytest tests/ -v

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet .claude-plugin/marketplace.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push to main
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: update marketplace.json [skip ci]"
          git push origin main
