name: Update Marketplace

on:
  push:
    branches:
      - main
    paths:
      - 'skills/**'
      - 'plugins/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Generate marketplace.json
        run: python3 scripts/generate_marketplace.py .claude-plugin/marketplace.json

      - name: Validate skills
        run: python3 scripts/validate_plugins.py

      - name: Run tests
        run: python3 -m pytest tests/ -v

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet .claude-plugin/marketplace.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open PR with updated marketplace.json
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        id: cpr
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/update-marketplace
          commit-message: "chore: update marketplace.json [skip ci]"
          title: "chore: update marketplace.json"
          body: "Automated update of `.claude-plugin/marketplace.json` generated by the Update Marketplace workflow."
          labels: automated

      - name: Enable auto-merge on PR
        if: steps.check.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
